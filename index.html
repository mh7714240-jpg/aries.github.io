<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Belajar JLPT - Danbo</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg);
            transition: 0.4s;
            overflow-x: hidden;
        }

        /* --- HALAMAN UTAMA: 3 FOLDER --- */
        #folder-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }

        .folder-grid {
            display: flex;
            gap: 30px;
            margin-top: 40px;
        }

        .folder-card {
            background: white;
            width: 160px;
            padding: 30px 10px;
            text-align: center;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.3s;
        }

        .folder-card:hover { transform: translateY(-10px); background: #eef2f3; }
        .folder-card i { font-size: 50px; display: block; margin-bottom: 10px; }

        /* --- HALAMAN LIST FILE --- */
        #file-screen {
            display: none;
            padding: 50px;
            max-width: 800px;
            margin: 0 auto;
        }

        .file-list {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .file-item {
            padding: 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            color: var(--accent);
            font-weight: bold;
        }

        .file-item:hover { background: #f9f9f9; }

        /* --- HALAMAN UJIAN & LAYAR 2/3 --- */
        #exam-screen {
            display: none;
            width: 100%;
        }

        #exam-content {
            width: 100%;
            padding: 40px;
            box-sizing: border-box;
            transition: width 0.4s ease;
        }

        /* Logic Layar 2/3 */
        body.chat-open #exam-content {
            width: 66.66vw;
        }

        .question-card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* --- FLOATING CHAT & SIDEBAR 1/3 --- */
        #chat-icon {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 1000;
            display: none; /* Muncul hanya saat ujian */
            align-items: center;
            justify-content: center;
            border: 2px solid var(--accent);
        }

        #chat-icon img { width: 85%; border-radius: 50%; }

        #chat-sidebar {
            position: fixed;
            top: 0;
            right: -33.33vw;
            width: 33.33vw;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #chat-sidebar.active { right: 0; }

        .chat-header {
            background: var(--primary);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sleep-btn {
            width: 35px;
            height: 35px;
            cursor: pointer;
        }

        .chat-body { flex: 1; padding: 20px; background: #f0f2f5; overflow-y: auto; }

        /* Utilitas */
        .btn-back { margin-bottom: 20px; cursor: pointer; padding: 10px; background: #ddd; border: none; border-radius: 5px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="folder-screen">
        <h1>Materi JLPT</h1>
        <div class="folder-grid">
            <div class="folder-card" onclick="openFolder('N1')">📂<br>N1</div>
            <div class="folder-card" onclick="openFolder('N2')">📂<br>N2</div>
            <div class="folder-card" onclick="openFolder('N3')">📂<br>N3</div>
        </div>
    </div>

    <div id="file-screen">
        <button class="btn-back" onclick="showFolderScreen()">⬅ Kembali ke Folder</button>
        <h2 id="folder-title">Folder N1</h2>
        <div class="file-list" id="file-list-container">
            </div>
    </div>

    <div id="exam-screen">
        <div id="exam-content">
            <button class="btn-back" onclick="openFolder(currentFolder)">⬅ Kembali ke Daftar File</button>
            <h2 id="exam-title-display">Ujian</h2>
            <div id="questions-area"></div>
        </div>
    </div>

    <div id="chat-icon" onclick="openDanbo()">
        <img src="image_810587.png" alt="Robot">
    </div>

    <div id="chat-sidebar">
        <div class="chat-header">
            <span>Diskusi Danbo</span>
            <img src="image_815c9c.png" class="sleep-btn" onclick="closeDanbo()" alt="Sleep">
        </div>
        <div class="chat-body">
            <div style="background:white; padding:10px; border-radius:10px;">
                Halo! Aku Danbo. Ada yang ingin ditanyakan soal ujian ini?
            </div>
        </div>
        <div style="padding:15px; border-top:1px solid #ddd; display:flex; gap:5px;">
            <input type="text" placeholder="Tanya sesuatu..." style="flex:1; padding:10px; border-radius:5px; border:1px solid #ccc;">
            <button style="background:var(--accent); color:white; border:none; padding:10px; border-radius:5px;">Kirim</button>
        </div>
    </div>

    <script>
        let currentFolder = '';

        // DATA SIMULASI
        const dbFiles = {
            'N1': ['Contoh Ujian JLPT N1 2019', 'Materi Bunpou N1'],
            'N2': ['Latihan Dokkai N2'],
            'N3': ['Vocabulary N3']
        };

        // NAVIGASI
        function showFolderScreen() {
            document.getElementById('folder-screen').style.display = 'flex';
            document.getElementById('file-screen').style.display = 'none';
            document.getElementById('exam-screen').style.display = 'none';
            document.getElementById('chat-icon').style.display = 'none';
        }

        function openFolder(level) {
            currentFolder = level;
            document.getElementById('folder-screen').style.display = 'none';
            document.getElementById('exam-screen').style.display = 'none';
            document.getElementById('file-screen').style.display = 'block';
            document.getElementById('chat-icon').style.display = 'none';
            document.getElementById('folder-title').innerText = "Folder " + level;

            const listContainer = document.getElementById('file-list-container');
            listContainer.innerHTML = '';
            
            dbFiles[level].forEach(fileName => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerText = '📄 ' + fileName;
                item.onclick = () => startExam(fileName);
                listContainer.appendChild(item);
            });
        }

        function startExam(title) {
            document.getElementById('file-screen').style.display = 'none';
            document.getElementById('exam-screen').style.display = 'block';
            document.getElementById('chat-icon').style.display = 'flex'; // Munculkan robot
            document.getElementById('exam-title-display').innerText = title;

            // Render soal dummy
            const area = document.getElementById('questions-area');
            area.innerHTML = '';
            for(let i=1; i<=10; i++) {
                area.innerHTML += `
                    <div class="question-card">
                        <p><strong>Soal ${i}:</strong> Ini adalah pertanyaan simulasi untuk ${title}.</p>
                        <div style="margin-left:20px;">○ Opsi A<br>○ Opsi B<br>○ Opsi C</div>
                    </div>
                `;
            }
        }

        // LOGIKA CHAT DANBO
        function openDanbo() {
            document.getElementById('chat-sidebar').classList.add('active');
            document.getElementById('chat-icon').classList.add('hidden');
            document.body.classList.add('chat-open');
        }

        function closeDanbo() {
            document.getElementById('chat-sidebar').classList.remove('active');
            document.getElementById('chat-icon').classList.remove('hidden');
            document.body.classList.remove('chat-open');
        }
    </script>
</body>
</html>
