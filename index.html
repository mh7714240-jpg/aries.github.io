<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT Practice - Danbo Edition</title>
    <style>
        :root { --primary: #27ae60; --bg: #f8f9fa; --text: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* Header & Progress */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .progress-text { font-weight: bold; color: var(--primary); }
        
        /* Reading Box */
        .reading-box { background: #fffdf0; border: 2px solid #f1c40f; padding: 20px; border-radius: 10px; margin-bottom: 25px; line-height: 1.8; font-size: 1.05em; white-space: pre-wrap; }
        .reading-title { display: block; margin-bottom: 10px; color: #d35400; font-weight: bold; border-bottom: 1px solid #fcebb6; }

        /* Question & Options */
        .question-section { margin-top: 20px; }
        .question-text { font-size: 1.2em; font-weight: 600; margin-bottom: 20px; }
        .options-grid { display: grid; gap: 12px; }
        .option-btn { padding: 15px; border: 2px solid #e0e0e0; border-radius: 8px; background: white; cursor: pointer; text-align: left; transition: all 0.2s; font-size: 1em; }
        .option-btn:hover { border-color: var(--primary); background: #f0fff4; }
        .option-btn.selected { border-color: var(--primary); background: #e8f6ef; font-weight: bold; }

        /* Navigation */
        .nav-controls { display: flex; justify-content: space-between; margin-top: 30px; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        .btn-prev { background: #95a5a6; color: white; }
        .btn-next { background: var(--primary); color: white; }
        .btn-finish { background: #2c3e50; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button class="btn btn-prev" onclick="changeQuestion(-1)" id="prev-btn">Kembali</button>
        <div class="progress-text" id="progress-display">Progres: 0 / 0</div>
    </div>

    <div id="quiz-app">
        <div id="reading-container" class="hidden">
            <div class="reading-box">
                <span class="reading-title" id="section-title"></span>
                <div id="main-text"></div>
            </div>
        </div>

        <div class="question-section">
            <div class="question-text" id="question-text">Memuat soal...</div>
            <div class="options-grid" id="options-container"></div>
        </div>
    </div>

    <div class="nav-controls">
        <div></div> <button class="btn btn-next" onclick="changeQuestion(1)" id="next-btn">Lanjut</button>
        <button class="btn btn-finish hidden" onclick="showResult()" id="finish-btn">Selesai & Cek Skor</button>
    </div>
</div>

<script>
    let allQuestions = [];
    let currentIndex = 0;
    let userAnswers = {};

    async function loadData() {
        try {
            const response = await fetch('data.json'); // Pastikan nama file sesuai
            const data = await response.json();
            
            // Gabungkan kategori tanpa merusak struktur Dokkai
            let tempQuestions = [];
            if(data.kanji) tempQuestions.push(...data.kanji);
            if(data.bunpou) tempQuestions.push(...data.bunpou);
            
            if(data.dokkai) {
                data.dokkai.forEach(item => {
                    // Cek jika ini adalah tipe soal grup (seperti no 33-36)
                    if (item.questions && item.text) {
                        item.questions.forEach(subQ => {
                            tempQuestions.push({
                                ...subQ,
                                parentText: item.text, // Simpan teks bacaan di tiap anak soal
                                sectionTitle: item.section_title
                            });
                        });
                    } else {
                        tempQuestions.push(item);
                    }
                });
            }

            allQuestions = tempQuestions;
            displayQuestion();
        } catch (error) {
            document.getElementById('question-text').innerText = "Gagal memuat JSON: " + error.message;
        }
    }

    function displayQuestion() {
        const q = allQuestions[currentIndex];
        const readingContainer = document.getElementById('reading-container');
        const optionsContainer = document.getElementById('options-container');
        
        // Update Progres
        document.getElementById('progress-display').innerText = `Progres: ${currentIndex + 1} / ${allQuestions.length}`;

        // Update Teks Bacaan (Dokkai)
        if (q.parentText) {
            readingContainer.classList.remove('hidden');
            document.getElementById('section-title').innerText = q.sectionTitle || "問題";
            document.getElementById('main-text').innerText = q.parentText;
        } else {
            readingContainer.classList.add('hidden');
        }

        // Update Teks Soal
        document.getElementById('question-text').innerText = q.q;

        // Update Pilihan Jawaban
        optionsContainer.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const isSelected = userAnswers[currentIndex] === idx;
            const btn = document.createElement('button');
            btn.className = `option-btn ${isSelected ? 'selected' : ''}`;
            btn.innerText = `${idx + 1}. ${opt}`;
            btn.onclick = () => selectOption(idx);
            optionsContainer.appendChild(btn);
        });

        // Update Tombol Navigasi
        document.getElementById('prev-btn').disabled = currentIndex === 0;
        
        if (currentIndex === allQuestions.length - 1) {
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('finish-btn').classList.remove('hidden');
        } else {
            document.getElementById('next-btn').classList.remove('hidden');
            document.getElementById('finish-btn').classList.add('hidden');
        }
    }

    function selectOption(index) {
        userAnswers[currentIndex] = index;
        displayQuestion(); // Refresh tampilan untuk menandai yang dipilih
    }

    function changeQuestion(step) {
        currentIndex += step;
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= allQuestions.length) currentIndex = allQuestions.length - 1;
        displayQuestion();
        window.scrollTo(0,0);
    }

    function showResult() {
        let score = 0;
        allQuestions.forEach((q, idx) => {
            if (userAnswers[idx] === q.correct) score++;
        });
        
        alert(`Latihan Selesai!\nSkor Anda: ${score} / ${allQuestions.length}`);
    }

    // Inisialisasi
    window.onload = loadData;
</script>

</body>
</html>
