<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Belajar Danbo - N1 Specialist</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #eef7ff; min-height: 100vh; }
    .home { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .chopper { width: 120px; margin-bottom: 20px; }
    .folders { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; width: 90%; max-width: 600px; }
    .folder { background: #ffd54f; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; font-weight: bold; }
    .viewer-page { display: none; height: 100vh; grid-template-columns: 300px 1fr; }
    .sidebar { background: #fff8e1; padding: 20px; border-right: 2px solid #ffd54f; overflow-y: auto; }
    .back-btn { padding: 10px; background: #1f3b5b; color: white; border-radius: 5px; text-align: center; cursor: pointer; margin-bottom: 20px; }
    .file-item { padding: 12px; background: white; margin-bottom: 8px; border-radius: 8px; cursor: pointer; border: 1px solid #ddd; }
    .file-item.active { background: #1f3b5b; color: white; }
    .content-area { background: #f4f4f4; padding: 20px; overflow-y: auto; display: flex; justify-content: center; width: 100%; }
    .quiz-container { background: white; width: 100%; max-width: 800px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .question { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .option-label { padding: 10px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .btn-selesai { background: #28a745; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 20px; }
    .feedback { font-weight: bold; font-size: 0.9em; margin-top: 5px; display: block; }
    .correct { color: #28a745; }
    .wrong { color: #dc3545; }
    @media (max-width: 768px) { .viewer-page { grid-template-columns: 1fr; grid-template-rows: auto 1fr; } .sidebar { max-height: 200px; } .options { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div id="home" class="home">
    <img class="chopper" src="https://media.giphy.com/media/3nYPJOsVt5RYnpPv3o/giphy.gif">
    <h1>Portal Belajar Danbo</h1>
    <div class="folders">
      <div class="folder" onclick="openLevel('n1')">JLPT N1</div>
      <div class="folder" onclick="openLevel('n2')">JLPT N2</div>
      <div class="folder" onclick="openLevel('n3')">JLPT N3</div>
    </div>
  </div>

  <div id="viewerPage" class="viewer-page">
    <div class="sidebar">
      <div class="back-btn" onclick="goHome()">← Kembali</div>
      <h2 id="levelTitle">Materi</h2>
      <div id="fileList"></div>
    </div>
    <div class="content-area" id="contentArea"></div>
  </div>

  <script>
    const contentData = {
      n1: [
        { type: 'quiz', id: 'tes-2024-12', title: 'Tes 2024 Bulan 12', icon: '📝' },
        { type: 'pdf', file: 'jlpt-n1-2024-12.pdf', title: 'PDF Materi', icon: '📄' }
      ],
      n2: [], n3: []
    };

    let fullDataJSON = null;

    async function openLevel(level) {
      document.getElementById('home').style.display = 'none';
      document.getElementById('viewerPage').style.display = 'grid';
      document.getElementById('levelTitle').textContent = 'Materi ' + level.toUpperCase();

      const listDiv = document.getElementById('fileList');
      listDiv.innerHTML = 'Memuat...';

      try {
        // SESUAI GAMBAR: assets/n1/n1-data.json
        const response = await fetch(`assets/${level}/${level}-data.json`);
        if (!response.ok) throw new Error("Gagal load JSON");
        fullDataJSON = await response.json();
      } catch (e) {
        console.error(e);
        fullDataJSON = null;
      }

      listDiv.innerHTML = '';
      contentData[level].forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.innerHTML = `${item.icon} ${item.title}`;
        div.onclick = () => {
          if(item.type === 'pdf') loadPDF(level, item.file, div);
          else displayQuiz(item.id, div);
        };
        listDiv.appendChild(div);
        if(index === 0) div.click();
      });
    }

    function displayQuiz(quizId, element) {
      setActive(element);
      const area = document.getElementById('contentArea');

      if (!fullDataJSON || !fullDataJSON[quizId]) {
        area.innerHTML = `<h3>⚠️ Data kuis "${quizId}" tidak ditemukan di file JSON.</h3>`;
        return;
      }

      const data = fullDataJSON[quizId];
      let html = `<div class="quiz-container"><h2>${data.title}</h2><form id="quizForm">`;
      data.questions.forEach((q, i) => {
        html += `<div class="question"><p>${q.q} <span id="f-${i}" class="feedback"></span></p><div class="options">`;
        q.options.forEach((opt, idx) => {
          html += `<label class="option-label"><input type="radio" name="q${i}" value="${idx}"> ${opt}</label>`;
        });
        html += `</div></div>`;
      });
      html += `<button type="button" class="btn-selesai" onclick="checkAnswers('${quizId}')">CEK JAWABAN</button></form></div>`;
      area.innerHTML = html;
    }

    function checkAnswers(id) {
      const qs = fullDataJSON[id].questions;
      qs.forEach((q, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        const fb = document.getElementById(`f-${i}`);
        if(sel && parseInt(sel.value) === q.correct) {
          fb.innerHTML = "✅ Benar!"; fb.className = "feedback correct";
        } else {
          fb.innerHTML = `❌ Salah! (Benar: ${q.options[q.correct]})`; fb.className = "feedback wrong";
        }
      });
    }

    function loadPDF(lvl, file, el) {
      setActive(el);
      const url = `https://docs.google.com/viewer?url=${encodeURIComponent(window.location.origin + window.location.pathname.replace('index.html','') + 'assets/'+lvl+'/'+file)}&embedded=true`;
      document.getElementById('contentArea').innerHTML = `<iframe src="${url}" style="width:100%;height:100%;border:none;"></iframe>`;
    }

    function setActive(el) {
      document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
    }

    function goHome() {
      document.getElementById('home').style.display = 'flex';
      document.getElementById('viewerPage').style.display = 'none';
    }
  </script>
</body>
</html>
