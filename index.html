<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT Learning System - Danbo Bawah</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--bg);
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- NAVIGASI FOLDER & FILE --- */
        #folder-screen, #file-screen {
            padding: 50px 20px;
            text-align: center;
        }

        .folder-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
        }

        .folder-card {
            background: white;
            width: 150px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .file-list {
            max-width: 600px;
            margin: 20px auto;
            background: white;
            border-radius: 10px;
            text-align: left;
        }

        .file-item {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            color: var(--accent);
        }

        /* --- AREA UJIAN (2/3 ATAS) --- */
        #exam-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        #exam-content {
            flex: 1; /* Mengambil ruang sisa */
            overflow-y: auto;
            padding: 30px;
            transition: height 0.4s ease;
        }

        /* Saat Chat Aktif, Area Ujian jadi 2/3 tinggi layar */
        body.chat-open #exam-content {
            flex: none;
            height: 66.66vh;
        }

        .question-card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* --- FLOATING ICON --- */
        #chat-icon {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--accent);
        }

        #chat-icon img { width: 80%; }

        /* --- SIDEBAR CHAT (1/3 BAWAH) --- */
        #chat-sidebar {
            position: fixed;
            bottom: -33.33vh; /* Sembunyi di bawah */
            left: 0;
            width: 100%;
            height: 33.33vh;
            background: white;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            transition: bottom 0.4s ease;
        }

        #chat-sidebar.active {
            bottom: 0;
        }

        .chat-header {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sleep-btn {
            width: 40px;
            height: 40px;
            cursor: pointer;
        }

        .chat-body {
            flex: 1;
            padding: 15px;
            background: #f9f9f9;
            overflow-y: auto;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="folder-screen">
        <h1>Materi JLPT</h1>
        <div class="folder-grid">
            <div class="folder-card" onclick="openFolder('N1')">📂 N1</div>
            <div class="folder-card" onclick="openFolder('N2')">📂 N2</div>
            <div class="folder-card" onclick="openFolder('N3')">📂 N3</div>
        </div>
    </div>

    <div id="file-screen" class="hidden">
        <button onclick="showFolderScreen()">⬅ Kembali</button>
        <h2 id="folder-title"></h2>
        <div class="file-list" id="file-list-container"></div>
    </div>

    <div id="exam-screen">
        <div id="exam-content">
            <button onclick="openFolder(currentLevel)">⬅ Tutup Ujian</button>
            <h2 id="exam-title-display"></h2>
            <div id="questions-area">
                <p>Memuat soal...</p>
            </div>
        </div>
    </div>

    <div id="chat-icon" onclick="openDanbo()">
        <img src="image_810587.png" alt="Robot">
    </div>

    <div id="chat-sidebar">
        <div class="chat-header">
            <span>Danbo Assistant</span>
            <img src="image_815c9c.png" class="sleep-btn" onclick="closeDanbo()" alt="Sleep">
        </div>
        <div class="chat-body">
            <p>Halo! Aku Danbo. Ada yang bisa dibantu dari soal di atas?</p>
        </div>
        <div style="padding:10px; background:#fff; display:flex; gap:10px;">
            <input type="text" placeholder="Tanya Danbo..." style="flex:1; padding:8px;">
            <button>Kirim</button>
        </div>
    </div>

    <script>
        let currentLevel = '';

        // Menyiapkan struktur data (Ganti dengan file lokalmu nanti)
        const mockData = {
            'N1': ['Contoh Ujian JLPT N1 2019'],
            'N2': ['Latihan N2'],
            'N3': ['Latihan N3']
        };

        function showFolderScreen() {
            document.getElementById('folder-screen').classList.remove('hidden');
            document.getElementById('file-screen').classList.add('hidden');
        }

        function openFolder(level) {
            currentLevel = level;
            document.getElementById('folder-screen').classList.add('hidden');
            document.getElementById('exam-screen').style.display = 'none';
            document.getElementById('file-screen').classList.remove('hidden');
            document.getElementById('folder-title').innerText = "Folder " + level;

            const list = document.getElementById('file-list-container');
            list.innerHTML = '';
            mockData[level].forEach(file => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerText = "📄 " + file;
                div.onclick = () => loadExamData(file);
                list.appendChild(div);
            });
        }

        // FUNGSI LOAD DATA (Siap untuk fetch assets/n1/n1-data.json)
        async function loadExamData(title) {
            document.getElementById('file-screen').classList.add('hidden');
            document.getElementById('exam-screen').style.display = 'flex';
            document.getElementById('chat-icon').style.display = 'flex';
            document.getElementById('exam-title-display').innerText = title;

            const area = document.getElementById('questions-area');
            area.innerHTML = '';

            /* ############################################################
               BAGIAN INTEGRASI FILE JSON (assets/n1/n1-data.json)
               Uncomment kode di bawah ini jika file sudah siap di server/folder: */
               
               try {
                   const response = await fetch('assets/n1/n1-data.json');
                   const data = await response.json();
                   // Misal ambil 10 soal pertama
                   const questions = data.questions.slice(0, 10); 
                   questions.forEach((q, i) => {
                       area.innerHTML += `<div class="question-card"><b>${i+1}.</b> ${q.q}</div>`;
                   });
               } catch (err) {
                   area.innerHTML = 'Gagal memuat file soal.';
               }

            // Placeholder jika fetch belum diaktifkan:
            for(let i=1; i<=10; i++) {
                area.innerHTML += `<div class="question-card"><b>Soal ${i}:</b> (Contoh Soal ${title})</div>`;
            }
        }

        // LOGIKA CHAT (BAWAH)
        function openDanbo() {
            document.getElementById('chat-sidebar').classList.add('active');
            document.getElementById('chat-icon').classList.add('hidden');
            document.body.classList.add('chat-open');
        }

        function closeDanbo() {
            document.getElementById('chat-sidebar').classList.remove('active');
            document.getElementById('chat-icon').classList.remove('hidden');
            document.body.classList.remove('chat-open');
        }
    </script>
</body>
</html>
