<!DOCTYPE html>
<html lang="id">
<head>

    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>siera JLPT Learning System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f0f2f5; --success: #27ae60; --error: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
          /* Pastikan login bar terlihat rapi */
#login-container {
    position: fixed; /* Gunakan fixed agar tidak hilang saat scroll */
    top: 15px;
    right: 20px;
    background: white;
    padding: 10px 15px;
    border-radius: 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    z-index: 2000;
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid var(--accent);
}

#username-input {
    border: none;
    outline: none;
    background: #f0f2f5;
    padding: 8px 15px;
    border-radius: 20px;
    font-size: 14px;
}

.login-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.login-btn:hover {
    background: var(--primary);
}
       
       #folder-screen, #file-screen { padding: 50px; text-align: center; overflow-y: auto; }
        .folder-grid { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .folder-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; width: 120px; transition: 0.2s; border: 2px solid transparent; }
        .folder-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        
        .file-list { max-width: 500px; margin: 20px auto; background: white; border-radius: 10px; text-align: left; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .year-divider { background: #eee; padding: 8px 15px; font-weight: bold; font-size: 14px; color: #555; }
        .file-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; color: var(--accent); font-weight: bold; }
        .file-item:hover { background: #f9f9f9; }

        #exam-screen { display: none; flex-direction: column; height: 100vh; }
        #exam-content { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 50px; }
        
        body.chat-open #exam-content { height: 67vh; flex: none; }

        .question-card { background: white; padding: 20px; margin-bottom: 25px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 800px; margin-left: auto; margin-right: auto; }
        .reading-block { background: #fffbe6 !important; border-left: 5px solid #f1c40f; padding: 15px; margin-bottom: 15px; border-radius: 8px; font-size: 15px; line-height: 1.6; }
        
        .options-list { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .option-item { padding: 12px 15px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .option-item.selected { background: #e3f2fd; border-color: var(--accent); }
        .option-item.correct { background: var(--success) !important; color: white !important; }
        .option-item.wrong { background: var(--error) !important; color: white !important; }

        .btn-finish { background: var(--success); color: white; padding: 15px 40px; border: none; border-radius: 30px; font-size: 18px; cursor: pointer; margin: 20px 0; }
        #result-box { display: none; margin: 30px auto; padding: 20px; background: white; border-radius: 10px; border: 2px solid var(--success); max-width: 800px; }
        .chart-container { max-width: 450px; margin: 20px auto; }

        #chat-icon { position: fixed; bottom: 20px; right: 20px; width: 75px; height: 75px; background: white; cursor: pointer; display: none; z-index: 1000; border-radius: 50%; border: 3px solid var(--accent); overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #chat-sidebar { position: fixed; bottom: -35vh; left: 0; width: 100%; height: 33vh; background: white; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; transition: 0.4s ease; z-index: 1001; }
        #chat-sidebar.active { bottom: 0; }
        /* Update CSS di dalam <style> */

.chat-header { 
    background: var(--primary); 
    color: white; 
    padding: 10px 20px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
}

/* CSS BARU UNTUK TOMBOL KELINCI */
.close-chat-btn {
    width: 35px;  /* Membuatnya kotak */
    height: 35px; /* Membuatnya kotak */
    cursor: pointer;
    overflow: hidden; /* Agar gambar tidak keluar kotak */
    border-radius: 8px; /* Sudut agak melengkung sedikit */
    transition: transform 0.2s ease-out; /* Transisi gerakan yang halus */
    display: flex;
    align-items: center;
    justify-content: center;
    background: white; /* Memberi latar putih agar kelinci terlihat jelas */
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.close-chat-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Agar gambar kelinci proporsional di dalam kotak */
}

/* EFEK BERGERAK SAAT DISENTUH MOUSE (PC) */
.close-chat-btn:hover {
    transform: translateY(-3px) scale(1.05); /* Sedikit naik dan membesar */
}

/* EFEK BERGERAK SAAT DITEKAN JARI (HP) */
.close-chat-btn:active {
    transform: translateY(1px) scale(0.98); /* Sedikit turun seperti membal */
}
        #siera-msg { padding: 12px; overflow-y: auto; flex: 1; background: #f9f9f9; font-size: 13px; }
        .chat-input-area { display: flex; padding: 8px; border-top: 1px solid #ddd; }
        #user-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        
        .search-container { background: white; padding: 10px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: center; margin-bottom: 20px; }
        #search-input { width: 100%; max-width: 400px; padding: 8px 15px; border-radius: 20px; border: 1px solid #ccc; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-container">
    <input type="text" id="username-input" placeholder="Siapa namamu?">
    <button class="login-btn" onclick="loginUser()">Masuk</button>
</div>
    
    <div id="folder-screen">
        <h1>Materi JLPT</h1>
        <div class="folder-grid" id="level-container">Memuat data...</div>
    </div>

    <div id="file-screen" class="hidden">
        <button onclick="showFolders()">⬅ Kembali</button>
        <h2 id="folder-title">Arsip Soal</h2>
        <div class="file-list" id="file-container"></div>
    </div>

    <div id="exam-screen">
        <div id="exam-content">
            <div style="display:flex; justify-content:space-between; align-items: center; max-width: 800px; margin: auto; padding-bottom: 10px;">
                <button onclick="location.reload()" style="padding: 8px 15px; cursor:pointer;">⬅ Keluar</button>
                <b id="progress-indicator">Progres: 0 / 0</b>
            </div>
            
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Cari kosakata atau soal..." onkeyup="searchQuestions()">
            </div>

            <h2 id="exam-title-display" style="text-align: center;"></h2>
            <div id="questions-area"></div>
            
            <div style="text-align:center;">
                <button id="submit-btn" class="btn-finish" onclick="showResults()">Selesai & Cek Skor</button>
                <div id="result-box">
                    <h2 id="final-score"></h2>
                    <div class="chart-container"><canvas id="scoreChart"></canvas></div>
                    <button class="btn-finish" onclick="location.reload()">Tutup Latihan</button>
                </div>
            </div>
        </div>
    </div>

    <div id="chat-icon" onclick="opensiera()">
        <img src="assets/icon_chat.jpg" alt="siera Icon" style="width: 100%; height: 100%; object-fit: cover;">
    </div>

   <div id="chat-sidebar">
    <div class="chat-header">
        <span>siera AI Assistant</span>
        
        <div class="close-chat-btn" onclick="closesiera()">
            <img src="assets/kelinci tidur.jpeg" alt="Tutup siera">
        </div>
    </div> <div id="siera-msg"></div>
    
    <div class="chat-input-area">
        <input type="text" id="user-input" placeholder="Tanya siera..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button id="send-btn" style="background:var(--accent); color:white; border:none; padding:0 15px; border-radius:15px; cursor:pointer;" onclick="sendMessage()">Kirim</button>
    </div>
</div> ```

    <script>
     // 1. Variabel Global
const BACKEND_URL = "https://web-backend-l5p7.onrender.com/siera-chat"; 
let currentUsername = ""; 
let currentQuestions = [];
let currentAnswers = [];
let totalSoal = 0;
let totalBenar = 0;
let isFinished = false;
let chatHistory = [];
let myRadarChart = null;
let imageFolderPath = "";
let lastActiveIndex = null;

// 2. Fungsi Login & Sesi
function loginUser() {
    const input = document.getElementById('username-input');
    const container = document.getElementById('login-container');
    const name = input.value.trim();
    
    if (name !== "") {
        const now = new Date().getTime();
        const expirationTime = now + (12 * 60 * 60 * 1000); 

        const userData = { username: name, expiry: expirationTime };
        localStorage.setItem('siera_user', JSON.stringify(userData));

        currentUsername = name;
        container.style.display = "none";
        
        addsieraMessage(`<strong>Sistem:</strong> Selamat datang, ${currentUsername}!`);
        sendMessage(`Halo siera, saya ${currentUsername}. Saya siap belajar!`, true);
    } else {
        alert("Masukkan namamu dulu ya!");
    }
}

function checkAutoLogin() {
    const savedData = localStorage.getItem('siera_user');
    const container = document.getElementById('login-container');

    if (savedData) {
        const userData = JSON.parse(savedData);
        const now = new Date().getTime();

        if (now < userData.expiry) {
            currentUsername = userData.username;
            container.style.display = "none";
            console.log("Auto-login sukses untuk:", currentUsername);
            
            setTimeout(() => {
                sendMessage(`(Sistem: User ${currentUsername} masuk kembali.)`, true);
            }, 1000); 
        } else {
            localStorage.removeItem('siera_user');
        }
    }
}

// 3. Fungsi Navigasi & Materi
async function loadLevels() {
    try {
        const res = await fetch('assets/manifest.json');
        const data = await res.json();
        const container = document.getElementById('level-container');
        container.innerHTML = '';
        data.levels.forEach(lvl => {
            const card = document.createElement('div');
            card.className = 'folder-card';
            card.innerHTML = `📁<br>${lvl.name}`;
            card.onclick = () => openLevelFiles(lvl);
            container.appendChild(card);
        });
    } catch (e) { console.error("Manifest Error:", e); }
}

function showFolders() {
    document.getElementById('file-screen').classList.add('hidden');
    document.getElementById('folder-screen').classList.remove('hidden');
}

function openLevelFiles(levelData) {
    document.getElementById('folder-screen').classList.add('hidden');
    document.getElementById('file-screen').classList.remove('hidden');
    const container = document.getElementById('file-container');
    container.innerHTML = '';
    levelData.years.forEach(y => {
        y.exams.forEach(ex => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerText = `📄 ${levelData.name} - ${ex.label}`;
            item.onclick = () => startExam(ex.path, ex.label);
            container.appendChild(item);
        });
    });
}

// 4. Sistem Ujian
async function startExam(path, label) {
    imageFolderPath = path.replace('.json', '/');
    document.getElementById('file-screen').classList.add('hidden');
    document.getElementById('exam-screen').style.display = 'flex';
    document.getElementById('chat-icon').style.display = 'block';
    document.getElementById('exam-title-display').innerText = label;
    const area = document.getElementById('questions-area');
    area.innerHTML = 'Memuat data soal...';

    try {
        const res = await fetch(`assets/${path}`);
        const data = await res.json();
        area.innerHTML = ''; 
        currentQuestions = [];
        
        Object.keys(data).forEach(cat => {
            if (Array.isArray(data[cat])) {
                data[cat].forEach((item) => {
                    if (item.questions) {
                        item.questions.forEach((subQ) => {
                            const qIndex = currentQuestions.length;
                            currentQuestions.push({ 
                                ...subQ, 
                                categoryGroup: cat, 
                                embeddedText: item.text || null,
                                image: item.image || subQ.image || null,
                                originalIndex: qIndex
                            });
                            renderSingleQuestion(currentQuestions[qIndex], qIndex, area);
                        });
                    }
                });
            }
        });
        totalSoal = currentQuestions.length;
        currentAnswers = new Array(totalSoal).fill(null);
        isFinished = false;
        updateStatus();
    } catch (e) { area.innerHTML = `<p style='color:red;'>Gagal: ${e.message}</p>`; }
}

function renderSingleQuestion(q, i, container) {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `question-card-${q.originalIndex}`; 
    
    let htmlContent = q.image ? `<img src="assets/${imageFolderPath}${q.image}" style="width:100%; margin-bottom:10px;">` : "";
    if (q.embeddedText && !q.image) htmlContent += `<div class="reading-block">${q.embeddedText}</div>`;
    
    let opts = '';
    q.options.forEach((opt, o) => {
        opts += `<div class="option-item" id="q${q.originalIndex}-o${o}" onclick="pickOption(${q.originalIndex}, ${o})">${o+1}. ${opt}</div>`;
    });

    htmlContent += `<small>[${q.categoryGroup}]</small><p><b>${q.q}</b></p><div class="options-list">${opts}</div>`;
    card.innerHTML = htmlContent;
    container.appendChild(card);
}

function pickOption(qIdx, oIdx) {
    if (isFinished) return;
    lastActiveIndex = qIdx;
    currentAnswers[qIdx] = oIdx;
    document.querySelectorAll(`[id^="q${qIdx}-o"]`).forEach(el => el.classList.remove('selected'));
    document.getElementById(`q${qIdx}-o${oIdx}`).classList.add('selected');
    updateStatus();
}

function updateStatus() {
    const answered = currentAnswers.filter(a => a !== null).length;
    document.getElementById('progress-indicator').innerText = `Progres: ${answered} / ${totalSoal}`;
}

// 5. Chat & AI
async function sendMessage(overrideMsg = null, isAuto = false) {
    const input = document.getElementById('user-input');
    const msg = overrideMsg || (input ? input.value.trim() : ""); 
    if(!msg) return;

    const userDisplay = currentUsername || "User Tamu";
    let contextSoal = "";

    if (lastActiveIndex !== null && currentQuestions[lastActiveIndex]) {
        const qData = currentQuestions[lastActiveIndex];
        contextSoal = `\n\n[KONTEKS SOAL No ${lastActiveIndex+1}]: ${qData.q}`;
    }

    if(!isAuto) addsieraMessage(`<strong>Kamu:</strong> ${msg}`); 
    if(input) input.value = '';

    const loadingId = "load-" + Date.now();
    addsieraMessage(`<div id="${loadingId}"><img src="assets/kon.gif" style="width: 50px;"></div>`);

    try {
        const res = await fetch(BACKEND_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                username: userDisplay, 
                userQuery: msg + contextSoal, 
                history: chatHistory,
                status: isFinished ? "POST_EXAM" : "DURING_EXAM"
            })
        });
        const data = await res.json();
        document.getElementById(loadingId).remove();
        addsieraMessage(`<strong>siera:</strong> ${data.reply}`);
        
        chatHistory.push({ role: "user", content: msg }, { role: "assistant", content: data.reply });
        if(chatHistory.length > 10) chatHistory = chatHistory.slice(-10);
    } catch (e) { document.getElementById(loadingId).innerHTML = "Gagal koneksi."; }
}

function addsieraMessage(t) { 
    const b = document.getElementById('siera-msg'); 
    const p = document.createElement('p'); p.innerHTML = t; 
    b.appendChild(p); b.scrollTop = b.scrollHeight; 
}

// 6. Hasil & Grafik
function showResults() {
    if (currentAnswers.includes(null) && !confirm("Ada soal belum dijawab. Yakin?")) return;
    isFinished = true;
    totalBenar = 0;
    const catStats = {};

    currentQuestions.forEach((q, i) => {
        if (!catStats[q.categoryGroup]) catStats[q.categoryGroup] = { b: 0, t: 0 };
        catStats[q.categoryGroup].t++;

        const isCorrect = currentAnswers[i] === q.correct;
        if (isCorrect) { totalBenar++; catStats[q.categoryGroup].b++; }
        
        document.querySelectorAll(`[id^="q${i}-o"]`).forEach((el, oIdx) => {
            if (oIdx === q.correct) el.classList.add('correct');
            else if (oIdx === currentAnswers[i]) el.classList.add('wrong');
        });
    });

    saveExamLog(currentUsername || "User Tamu", totalBenar, totalSoal);
    document.getElementById('result-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('final-score').innerText = `Skor: ${totalBenar} / ${totalSoal}`;
    
    drawChart(Object.keys(catStats), Object.keys(catStats).map(c => Math.round((catStats[c].b/catStats[c].t)*100)));
    opensiera();
    sendMessage(`Sistem: Ujian Selesai. User ${currentUsername} benar ${totalBenar}/${totalSoal}.`, true);
}

function saveExamLog(user, score, total) {
    const logs = JSON.parse(localStorage.getItem('siera_exam_logs')) || [];
    logs.push({ user, date: new Date().toLocaleString('id-ID'), score, total });
    localStorage.setItem('siera_exam_logs', JSON.stringify(logs));
}

function drawChart(labels, data) {
    const ctx = document.getElementById('scoreChart').getContext('2d');
    if (myRadarChart) myRadarChart.destroy();
    myRadarChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: labels,
            datasets: [{ label: '% Benar', data: data, backgroundColor: 'rgba(52,152,219,0.2)', borderColor: '#3498db' }]
        },
        options: { scales: { r: { min: 0, max: 100 } } }
    });
}

// 7. Init
function opensiera() { document.getElementById('chat-sidebar').classList.add('active'); }
function closesiera() { document.getElementById('chat-sidebar').classList.remove('active'); }

window.onload = () => {
    loadLevels();
    checkAutoLogin();
};
</script>
</body>
</html>
