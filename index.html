<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian JLPT N1 - Interaktif</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            overflow-x: hidden;
            background-color: #f4f7f6;
        }

        /* Container Utama Soal (2/3 layar saat chat buka) */
        #main-exam-container {
            width: 100vw;
            padding: 40px;
            box-sizing: border-box;
            transition: width 0.4s ease;
        }

        body.chat-open #main-exam-container {
            width: 66.66vw;
        }

        .question-card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .options-list {
            list-style: none;
            padding: 0;
        }

        .options-list li {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .options-list li:hover {
            background: #e1f5fe;
        }

        /* Floating Chat Widget */
        #chat-icon {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--accent-color);
        }

        #chat-icon img {
            width: 80%;
            height: auto;
        }

        #chat-window {
            position: fixed;
            top: 0;
            right: 0;
            width: 33.33vw;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            z-index: 1001;
            transform: translateX(100%);
            transition: transform 0.4s ease;
        }

        #chat-window.visible {
            transform: translateX(0);
        }

        .chat-header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sleep-btn {
            width: 35px;
            height: 35px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .sleep-btn:hover { opacity: 0.8; }

        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f0f2f5;
        }

        .chat-footer {
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ddd;
        }

        .chat-footer input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 20px;
        }

        /* Utilitas */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="main-exam-container">
        <h1 id="exam-title">Memuat Soal...</h1>
        <div id="questions-wrapper"></div>
    </div>

    <div id="chat-icon" onclick="toggleChat()">
        <img src="image_810587.png" alt="Robot Icon">
    </div>

    <div id="chat-window">
        <div class="chat-header">
            <span>Diskusi Danbo</span>
            <img src="image_815c9c.png" class="sleep-btn" onclick="toggleChat()" alt="Tidur">
        </div>
        <div class="chat-body" id="chat-content">
            <div style="background:white; padding:10px; border-radius:10px; margin-bottom:10px;">
                Halo! Aku Danbo. Klik soal yang sulit, lalu tanyakan padaku di sini!
            </div>
        </div>
        <div class="chat-footer">
            <input type="text" placeholder="Tulis pesan...">
            <button style="border:none; background:var(--accent-color); color:white; padding:10px 15px; border-radius:10px; cursor:pointer;">Kirim</button>
        </div>
    </div>

    <script>
        const examData = {
            "tes-2024-12": {
                "title": "Tes JLPT N1 - Desember 2024",
                "questions": [
                    { "q": "1. 佐藤選手がゴールを決めたとき、観客は【絶叫】した。", "options": ["せっきょう", "ぜっきょう", "ぜっきゅう", "せっきゅう"], "correct": 1 },
                    { "q": "2. 【背後】から物音が聞こえた。", "options": ["はいご", "はいこう", "せいご", "せいこう"], "correct": 0 },
                    { "q": "3. 将来の【抱負】を述べる。", "options": ["ほうふ", "ほうぶ", "ほふ", "ほぶ"], "correct": 0 },
                    { "q": "4. 人を【侮って】はいけない。", "options": ["からかって", "ののしって", "あなどって", "うらぎって"], "correct": 2 },
                    { "q": "5. 相手がわかるように、【筋道】を立てて説明した。", "options": ["きんどう", "すじどう", "きんみち", "すじみち"], "correct": 3 },
                    { "q": "6. その小説の主人公は、【奔放】な性格をしている。", "options": ["はんぽう", "ぼんぽう", "ほんぽう", "ばんぽう"], "correct": 2 },
                    { "q": "7. その生物は、厳しい環境に（　）できる能力を持っている。", "options": ["適応", "合致", "転換", "推移"], "correct": 0 },
                    { "q": "8. 店の売り上げを五年で二倍にするという目標を（　）、みんなで努力している。", "options": ["企てて", "興して", "築いて", "掲げて"], "correct": 3 },
                    { "q": "9. 新しい市長は前市長の政策を（　）し、駅前の開発を進めると述べた。", "options": ["相続", "獲得", "踏襲", "伝承"], "correct": 2 },
                    { "q": "10. 台風で電車の到着が大幅に遅れたため、駅でしばらく（　）された。", "options": ["息抜き", "棚上げ", "待ち伏せ", "足止め"], "correct": 3 },
                    { "q": "11. 今日は試合で一日中走り続けたので、疲れて（　）になった。", "options": ["めちゃめちゃ", "へとへと", "どろどろ", "ぐちゃぐちゃ"], "correct": 1 },
                    { "q": "12. 工場の誘致について、市長が丁寧に説明し、住民の不安の（　）に努めた。", "options": ["払拭", "喪失", "破棄", "排斥"], "correct": 0 },
                    { "q": "13. 階段でつまずいて転びそうになったので、（　）隣にいた友人の腕をつかんだ。", "options": ["じきに", "いまに", "とっさに", "とっくに"], "correct": 2 },
                    { "q": "14. 【意味が最も近いもの】社長は小林部長の【手腕】を高く評価しているようだ。", "options": ["経験", "能力", "考え", "人柄"], "correct": 1 },
                    { "q": "15. 【意味が最も近いもの】時間を【ロスして】しまった。", "options": ["間違えて", "無駄にして", "かいて", "延長して"], "correct": 1 },
                    { "q": "16. 【意味が最も近いもの】確認が【おろそかに】なっていた。", "options": ["めんどうに", "困難に", "遅く", "いいかげんに"], "correct": 3 },
                    { "q": "17. 【意味が最も近いもの】私たちのチームの【目下】の目標は、市の大会で優勝することだ。", "options": ["最大", "将来", "今", "最低限"], "correct": 2 },
                    { "q": "18. 【意味が最も近いもの】経費を考慮したうえで、古いアパートの改修工事を【請け負う】ことにした。", "options": ["引き受ける", "申し込む", "断る", "諦める"], "correct": 0 },
                    { "q": "19. 【意味が最も近いもの】先生に本を【進呈しました】。", "options": ["差し上げました", "いただきました", "お貸ししました", "お借りしました"], "correct": 0 },
                    { "q": "20. 【正しい使い方】加工", "options": ["生活習慣に加工するようなアドバイス", "余った木材を加工した商品を販売", "民家を安く購入して民宿に加工した", "就業規則の一部を加工することにした"], "correct": 1 },
                    { "q": "21. 【正しい使い方】養う", "options": ["家で養うことにした", "植物を養うために鉢と土を買った", "自分の会社を養ってきた", "３人の子どもを養っている"], "correct": 3 },
                    { "q": "22. 【正しい使い方】資質", "options": ["カメラの資質は日に日に向上", "この動物は資質は荒いので注意", "製品の資質を管理する仕事", "陸上選手としての資質に恵まれている"], "correct": 3 },
                    { "q": "23. 【正しい使い方】正当", "options": ["正当な組み立てたのに", "私の正当な名前は「丸山」です", "正当な評価を受けていなかった", "工事は正当に進んでいる"], "correct": 2 },
                    { "q": "24. 【正しい使い方】ありきたり", "options": ["コンビニがありきたりで便利", "ストーリーはありきたりでつまらなかった", "助けるのはありきたりのことだ", "ありきたりのの方は入場料1000円"], "correct": 1 },
                    { "q": "25. 【正しい使い方】間柄", "options": ["木村さんとは親しい間柄ではない。", "友好条約で両国の間柄は進展する。", "環境破壊との間柄が指摘される。", "海と間柄の深い暮らしをしてきた。"], "correct": 0 },
                    { "q": "26. 買う（　）無駄だったよ。", "options": ["より", "のみ", "には", "だけ"], "correct": 3 },
                    { "q": "27. 健康意識の高まり（　）健康食品は急成長している。", "options": ["に次いで", "にわたって", "を受けて", "をめぐって"], "correct": 2 },
                    { "q": "28. 家に（　）食事もとらず、寝てしまった。", "options": ["帰り次第", "帰るなり", "帰ったなり", "帰るとなれば"], "correct": 1 },
                    { "q": "29. 不正にアクセスされる（　）、やむを得ない。", "options": ["しかない以上", "しかない反面", "恐れがある以上", "恐れがある反面"], "correct": 2 },
                    { "q": "30. 一日では（　）作品が展示されていた。", "options": ["見きれないほどの", "見ずにはいられないほどの", "見きれないといった", "見ずにはいられないといった"], "correct": 0 },
                    { "q": "31. なるべく余計な出費を（　）、スキー旅行に行くことにした。", "options": ["抑えたら抑えたで", "抑えられるものなら", "抑えるには抑えずに", "抑えたいところだが"], "correct": 3 },
                    { "q": "32. 高校レベルの数学の問題をすらすらと（　）。", "options": ["解けるとは", "解けるものなら", "解いたまでだ", "解いてみせた"], "correct": 3 },
                    { "q": "33. この地域一帯は海だった（　）。", "options": ["という", "といえる", "といった", "といわれる"], "correct": 3 },
                    { "q": "34. 子どもの教育機会が奪われること（　）。", "options": ["があるわけではない", "であるわけではない", "があってはならない", "であってはならない"], "correct": 2 },
                    { "q": "35. 青木「私（　）」 先生「もちろん」", "options": ["だったらいいんですか", "なんかでいいんですか", "だったらいいんでしょう", "なんかでいいんでしょう"], "correct": 1 },
                    { "q": "36. 【並び替え】昨日はとても寒く、積もり (A) (B) ★ (C) ずっと雪が降っていた。", "options": ["が", "こそ", "しなかった", "午前中"], "correct": 0 },
                    { "q": "37. 【並び替え】この映画はあまりにも正直で (A) (B) ★ (C) 、コメディー作品だ。", "options": ["真面目すぎる", "トラブルが絶えない", "がゆえに", "男の日常を描いた"], "correct": 2 },
                    { "q": "38. 【並び替え】(A) (B) ★ (C) 読みやすいように...。", "options": ["堅苦しいものと思われがちだが", "抵抗がある人にも", "一般的にビジネス書というと", "ビジネス書に"], "correct": 0 },
                    { "q": "39. 【並び替え】渋滞の中を ___ ___ ★ ___ 遊園地に入る前から疲れてしまった。", "options": ["今度は", "３時間運転して", "駐車場が混雑していて", "ようやくついたと思ったら"], "correct": 2 },
                    { "q": "40. 【並び替え】商品やサービスが ___ ___ ★ ___ ない。", "options": ["売れるも売れないも", "その存在が", "知られないことには", "どんなに良い物でも"], "correct": 1 },
                    { "q": "41. ( 41 ) に入る最も適当なものはどれか。", "options": ["気を使えはしない", "気を使ってなどいない", "気を使わせられはしない", "気を使わせてなどいない"], "correct": 3 },
                    { "q": "42. ( 42 ) に入る最も適当なものはどれか。", "options": ["それによって", "そればかりでなく", "それどころか", "それにもかかわらず"], "correct": 2 },
                    { "q": "43. ( 43 ) に入る最も適当なものはどれか。", "options": ["承知していれば", "承知していて", "承知していたのか", "承知していたかのように"], "correct": 3 },
                    { "q": "44. ( 44 ) に入る最も適当なものはどれか。", "options": ["なら", "だって", "でさえ", "といっても"], "correct": 0 },
                    { "q": "45. 【読解】筆者によると...", "options": ["A", "B", "C", "D"], "correct": 2 },
                    { "q": "49. ライオンの子育てについて、筆者はどのように述べているか。", "options": ["生後すぐに、群れの中で雌が交代で育てる。", "生後一カ月あまり過ぎると、経験豊富な年長の雌が育てる。", "歩けるようになるまで、群れの中で母親が育てる。", "歩けるようになると、群れの雌が協力して育てる。"], "correct": 3 },
                    { "q": "50. 共同生活の利点について、...", "options": ["A", "B", "C", "D"], "correct": 1 },
                    { "q": "51. 取材をしている人から...", "options": ["A", "B", "C", "D"], "correct": 1 },
                    { "q": "52. 筆者の考えに合うのはどれか。", "options": ["A", "B", "C", "D"], "correct": 3 },
                    { "q": "53. 「こういった時」とは...", "options": ["A", "B", "C", "D"], "correct": 1 },
                    { "q": "54. マーケティング調査の結果...", "options": ["A", "B", "C", "D"], "correct": 2 },
                    { "q": "55. 「待つ」ことからはじまって...", "options": ["A", "B", "C", "D"], "correct": 2 },
                    { "q": "56. 筆者によると、村の人たちの...", "options": ["A", "B", "C", "D"], "correct": 3 },
                    { "q": "57. 教育の仕事は通常の仕事と...", "options": ["A", "B", "C", "D"], "correct": 1 },
                    { "q": "58. 初年度の教師の緊張感は...", "options": ["A", "B", "C", "D"], "correct": 2 },
                    { "q": "59. 教育を仕事にしている人間にとって...", "options": ["A", "B", "C", "D"], "correct": 3 },
                    { "q": "60. 部下や後輩が指示待ちに...", "options": ["A", "B", "C", "D"], "correct": 3 },
                    { "q": "61. 指示待ちになっている部下や後輩...", "options": ["A", "B", "C", "D"], "correct": 2 },
                    { "q": "62. 人々は脳科学に何を期待...", "options": ["A", "B", "C", "D"], "correct": 2 },
                    { "q": "63. 脳科学について、筆者の考え...", "options": ["A", "B", "C", "D"], "correct": 2 },
                    { "q": "64. 筆者が言いたいことは何か。", "options": ["A", "B", "C", "D"], "correct": 1 },
                    { "q": "65. サイさんに支給される助成金...", "options": ["A", "B", "C", "D"], "correct": 3 },
                    { "q": "66. ジムさんが活動終了後に必ず...", "options": ["A", "B", "C", "D"], "correct": 3 }
                ]
            }
        };

        // Render Soal
        const container = document.getElementById('questions-wrapper');
        const exam = examData["tes-2024-12"];
        document.getElementById('exam-title').innerText = exam.title;

        exam.questions.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <p><strong>Soal ${index + 1}:</strong> ${item.q}</p>
                <ul class="options-list">
                    ${item.options.map((opt, i) => `<li onclick="checkAns(${index}, ${i})">${opt}</li>`).join('')}
                </ul>
            `;
            container.appendChild(card);
        });

        // Fitur Chat Toggle
        function toggleChat() {
            const win = document.getElementById('chat-window');
            const icon = document.getElementById('chat-icon');
            const body = document.body;

            if (win.classList.contains('visible')) {
                win.classList.remove('visible');
                icon.classList.remove('hidden');
                body.classList.remove('chat-open');
            } else {
                win.classList.add('visible');
                icon.classList.add('hidden');
                body.classList.add('chat-open');
            }
        }

        function checkAns(qIdx, choiceIdx) {
            const correct = exam.questions[qIdx].correct;
            if(choiceIdx === correct) {
                alert("Benar!");
            } else {
                alert("Salah, coba lagi.");
            }
        }
    </script>
</body>
</html>
