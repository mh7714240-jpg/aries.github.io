<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT System - Danbo AI</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f0f2f5; --success: #27ae60; --error: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #folder-screen, #file-screen { padding: 50px; text-align: center; overflow-y: auto; }
        .folder-grid { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .folder-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; width: 120px; }
        .file-list { max-width: 500px; margin: 20px auto; background: white; border-radius: 10px; text-align: left; }
        .file-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; color: var(--accent); font-weight: bold; }
        #exam-screen { display: none; flex-direction: column; height: 100vh; }
        #exam-content { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 150px; }
        .question-card { background: white; padding: 20px; margin-bottom: 25px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .option-item { padding: 12px 15px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .option-item.selected { background: #e3f2fd; border-color: var(--accent); }
        .option-item.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .option-item.wrong { background: var(--error) !important; color: white; border-color: var(--error); }
        #chat-icon { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; cursor: pointer; display: none; z-index: 1000; }
        #chat-icon img { width: 100%; border-radius: 50%; border: 2px solid var(--accent); }
        #chat-sidebar { position: fixed; bottom: -45vh; left: 0; width: 100%; height: 45vh; background: white; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; transition: bottom 0.4s ease; z-index: 1001; }
        #chat-sidebar.active { bottom: 0; }
        #danbo-msg { padding: 15px; overflow-y: auto; flex: 1; background: #f9f9f9; font-size: 14px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="folder-screen">
        <h1>Materi JLPT</h1>
        <div class="folder-grid">
            <div class="folder-card" onclick="openFolder('n1')">📁<br>N1</div>
            <div class="folder-card" onclick="openFolder('n3')">📁<br>N3</div>
        </div>
    </div>

    <div id="file-screen" class="hidden">
        <button onclick="showFolders()">⬅ Kembali</button>
        <div class="file-list" id="file-container"></div>
    </div>

    <div id="exam-screen">
        <div id="exam-content">
            <div style="display:flex; justify-content:space-between;">
                <button onclick="location.reload()">⬅ Keluar</button>
                <b id="progress-indicator"></b>
            </div>
            <h2 id="exam-title-display"></h2>
            <div id="questions-area"></div>
            <div style="text-align:center;">
                <button id="submit-btn" style="padding:15px 30px; background:var(--success); color:white; border:none; border-radius:25px;" onclick="showResults()">Selesai & Cek Skor</button>
            </div>
        </div>
    </div>

    <div id="chat-icon" onclick="openDanbo()"><img src="image_810587.png"></div>

    <div id="chat-sidebar">
        <div style="background:var(--primary); color:white; padding:10px; display:flex; justify-content:space-between;">
            <span>Danbo AI Helper</span>
            <span onclick="closeDanbo()" style="cursor:pointer;">✖</span>
        </div>
        <div id="danbo-msg"></div>
        <div style="padding:10px; display:flex;">
            <input type="text" id="user-input" style="flex:1; padding:10px; border-radius:20px; border:1px solid #ccc;" placeholder="Tanyakan soal...">
            <button onclick="sendMessage()" style="margin-left:5px; border-radius:20px; padding:0 15px;">Kirim</button>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://web-backend-l5p7.onrender.com/danbo-chat";
        let currentQuestions = [];
        let currentAnswers = [];
        let isFinished = false;
        let chatHistory = [];

        function openFolder(level) {
            document.getElementById('folder-screen').classList.add('hidden');
            document.getElementById('file-screen').classList.remove('hidden');
            const container = document.getElementById('file-container');
            container.innerHTML = '<div class="file-item" onclick="startExam(\'n3\', \'2011/07\')">📄 2011/07</div>';
        }

        async function startExam(level, fileName) {
            document.getElementById('file-screen').classList.add('hidden');
            document.getElementById('exam-screen').style.display = 'flex';
            document.getElementById('chat-icon').style.display = 'block';
            
            try {
                const response = await fetch(`assets/${level}/${fileName}.json`);
                const data = await response.json();
                const key = Object.keys(data)[0];
                currentQuestions = data[key].questions;
                currentAnswers = new Array(currentQuestions.length).fill(null);

                const area = document.getElementById('questions-area');
                area.innerHTML = '';
                currentQuestions.forEach((item, idx) => {
                    const card = document.createElement('div');
                    card.className = 'question-card';
                    // Tampilan HTML tetap bersih tanpa kategori
                    let optionsHtml = item.options.map((opt, oIdx) => 
                        `<div class="option-item" id="q${idx}-o${oIdx}" onclick="pickOption(${idx}, ${oIdx})">${oIdx + 1}. ${opt}</div>`
                    ).join('');
                    card.innerHTML = `<p><strong>${item.q}</strong></p><div>${optionsHtml}</div>`;
                    area.appendChild(card);
                });
            } catch (e) { alert("Gagal memuat soal."); }
        }

        function pickOption(qIdx, oIdx) {
            if (isFinished) return;
            currentAnswers[qIdx] = oIdx;
            document.querySelectorAll(`[id^="q${qIdx}-o"]`).forEach(el => el.classList.remove('selected'));
            document.getElementById(`q${qIdx}-o${oIdx}`).classList.add('selected');
        }

        function showResults() {
            isFinished = true;
            currentQuestions.forEach((q, i) => {
                document.getElementById(`q${i}-o${q.correct}`).classList.add('correct');
                if (currentAnswers[i] !== null && currentAnswers[i] !== q.correct) {
                    document.getElementById(`q${i}-o${currentAnswers[i]}`).classList.add('wrong');
                }
            });
            openDanbo();
            addDanboMessage("Danbo", "Selesai! Kamu bisa tanya pembahasan soal yang sulit tadi ya.");
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value;
            if(!msg) return;

            addDanboMessage("Kamu", msg);
            input.value = '';

            // KONSEP KRUSIAL: Mengirim kategori tersembunyi ke Danbo
            const contextForDanbo = currentQuestions.map((item, idx) => {
                return `[ID:${idx+1}] [Kategori:${item.category}] Soal: ${item.q}`;
            }).join("\n");

            try {
                const res = await fetch(BACKEND_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        userQuery: msg, 
                        context: contextForDanbo, 
                        history: chatHistory 
                    })
                });
                const data = await res.json();
                addDanboMessage("Danbo", data.reply);
                chatHistory.push({ role: "user", content: msg }, { role: "assistant", content: data.reply });
            } catch (e) { addDanboMessage("Danbo", "Koneksi bermasalah."); }
        }

        function addDanboMessage(sender, text) {
            const box = document.getElementById('danbo-msg');
            box.innerHTML += `<p><strong>${sender}:</strong> ${text}</p>`;
            box.scrollTop = box.scrollHeight;
        }

        function openDanbo() { document.getElementById('chat-sidebar').classList.add('active'); }
        function closeDanbo() { document.getElementById('chat-sidebar').classList.remove('active'); }
        function showFolders() { location.reload(); }
    </script>
</body>
</html>
